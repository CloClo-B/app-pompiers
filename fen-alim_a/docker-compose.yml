services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - fenalim_net

  db:
    image: postgis/postgis:16-3.4
    container_name: fenalim_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fenalim
      POSTGRES_PASSWORD: fenalim123
      POSTGRES_DB: fenalim_db
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - fenalim_net
    ports:
      - "5432:5432"

  api:
    build: ./backend
    container_name: fenalim_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://fenalim:fenalim123@db:5432/fenalim_db
    depends_on:
      - db
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.fenalim.local`)"
      - "traefik.http.routers.api.entrypoints=web"
    networks:
      - fenalim_net
    volumes:
    - ./backend/app:/app/app

  pgadmin:
    image: dpage/pgadmin4
    container_name: fenalim_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fenalim.fr
      PGADMIN_DEFAULT_PASSWORD: E03?M12/
    ports:
      - "5051:80"
    depends_on:
      - db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.fenalim.local`)"
      - "traefik.http.routers.pgadmin.entrypoints=web"
    networks:
      - fenalim_net

networks:
  fenalim_net:
    driver: bridge

volumes:
  db_data:
