services:
  #Conteneur pour la base de données (db)
  db:
    image: postgis/postgis:16-3.4
    container_name: fenalim_db
    restart: unless-stopped
    #Informations de connexion pour la base de données fournies par le fichier .env
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - fenalim_net
    ports:
      - "5432:5432"
  
  #Conteneur pour l'api
  api:
    build: ./backend
    container_name: fenalim_api
    restart: unless-stopped
    # URL de la base de données fournie par le fichier .env
    env_file:
      - .env
    #L'api dépend de la base de données
    depends_on:
      - db
    ports:
      - "8000:8000"
    networks:
      - fenalim_net
    volumes:
    - ./backend/app:/app/app
    - ./backend/images:/app/images
    #- ./.env:/app/.env


  #Conteneur pour pgadmin
  pgadmin:
    image: dpage/pgadmin4
    container_name: fenalim_pgadmin
    restart: unless-stopped
    # Informations de connexion fournies par le fichier .env
    env_file:
      - .env
    ports:
      - "5051:80"
    #pgadmin dépend de la base de données
    depends_on:
      - db
    networks:
      - fenalim_net

#Réseau commun pour tous les conteneurs
networks:
  fenalim_net:
    driver: bridge

volumes:
  db_data:
